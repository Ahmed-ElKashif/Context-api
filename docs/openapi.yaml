openapi: 3.0.3

info:
  title: Context API — AI Endpoints
  description: |
    All AI-powered endpoints for the Context platform.

    ### Authentication
    Every endpoint requires a Bearer JWT token obtained from `POST /api/auth/login`.

    ### Token Budget
    Each user has a **50,000 token/day** budget (configurable via `AI_DAILY_TOKEN_BUDGET` env var).
    Endpoints marked ⚡ consume tokens. Exceeding the budget returns **429** with `Retry-After` headers.

    ### Rate Limit Headers (on 429)
    | Header | Description |
    |---|---|
    | `Retry-After` | Seconds until midnight UTC reset |
    | `X-RateLimit-Limit` | Daily budget (50000) |
    | `X-RateLimit-Remaining` | Always 0 on 429 |
    | `X-RateLimit-Reset` | ISO timestamp of reset |
  version: "1.0.0"
  contact:
    name: Context API Team

servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://your-production-domain.com
    description: Production

tags:
  - name: AI Core
    description: Semantic organization and search (`/api/ai`)
  - name: Document AI
    description: Per-document AI features — RAG chat, upload pipeline, comparison (`/api/documents`)
  - name: Folder AI
    description: Full-library semantic tree proposal (`/api/folders`)
  - name: Comparison
    description: Dedicated document comparison (`/api/comparison`)

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Shared ───────────────────────────────────────────────────────────────

    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    TokenBudget429:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Daily AI token budget exceeded."
        message:
          type: string
          example: "You have used all 50,000 tokens for today. Your budget resets at midnight UTC."
        tokensUsed:
          type: integer
          example: 50000
        limit:
          type: integer
          example: 50000
        resetAt:
          type: string
          format: date-time
          example: "2026-05-16T00:00:00.000Z"
        retryAfterSeconds:
          type: integer
          example: 43200

    ComparisonResult:
      type: object
      properties:
        similarities:
          type: array
          items:
            type: string
          example: ["Both discuss neural network architectures", "Both reference ImageNet"]
        differences:
          type: array
          items:
            type: string
          example: ["Doc A covers CNNs, Doc B covers Transformers"]
        uniqueToA:
          type: array
          items:
            type: string
          example: ["ResNet skip connections", "Batch normalization"]
        uniqueToB:
          type: array
          items:
            type: string
          example: ["Self-attention mechanisms", "Positional encoding"]

    FolderUpdateItem:
      type: object
      required: [documentId, newPath]
      properties:
        documentId:
          type: string
          minLength: 24
          maxLength: 24
          example: "6645f2a3b1e2c3d4e5f60001"
        newPath:
          type: string
          example: "Finance/Reports"

    SubfolderNode:
      type: object
      properties:
        name:
          type: string
          example: "Q1 Reports"
        reason:
          type: string
          example: "January-March financial summaries grouped by quarter."
        documentIds:
          type: array
          items:
            type: string
          example: ["6645f2a3b1e2c3d4e5f60003"]

    FolderNode:
      type: object
      properties:
        name:
          type: string
          example: "Finance & Reporting"
        reason:
          type: string
          example: "All invoices, tax documents, and quarterly reports share a financial context."
        documentIds:
          type: array
          items:
            type: string
          example: ["6645f2a3b1e2c3d4e5f60001", "6645f2a3b1e2c3d4e5f60002"]
        subfolders:
          type: array
          items:
            $ref: "#/components/schemas/SubfolderNode"

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    SemanticSearchResult:
      type: object
      properties:
        text:
          type: string
          description: The matching text chunk
          example: "Neural networks are a subset of machine learning..."
        confidenceScore:
          type: number
          example: 94.72
        documentId:
          type: string
          example: "6645f2a3b1e2c3d4e5f60001"
        documentTitle:
          type: string
          example: "Intro to Deep Learning"
        documentType:
          type: string
          enum: [PDF, Word, Image, TextSnippet]
        documentUrl:
          type: string
          example: "https://res.cloudinary.com/..."
        chunkIndex:
          type: integer
          example: 3

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY (applied globally)
# ─────────────────────────────────────────────────────────────────────────────

security:
  - bearerAuth: []

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ══════════════════════════════════════════════════════
  # AI CORE
  # ══════════════════════════════════════════════════════

  /api/ai/organize-folder:
    post:
      tags: [AI Core]
      summary: "⚡ Generate folder proposal for specific documents"
      description: |
        Takes an explicit list of document IDs + titles, fetches their summaries
        and tags from MongoDB, then uses GPT-4o-mini with `withStructuredOutput()`
        to propose a flat `documentId → folderPath` mapping.

        **Use this when:** The user selects specific documents and asks "where should these go?"

        Complement with `PUT /api/ai/apply-folders` to commit the result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documents]
              properties:
                documents:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [title]
                    properties:
                      _id:
                        type: string
                        minLength: 24
                        maxLength: 24
                        example: "6645f2a3b1e2c3d4e5f60001"
                      id:
                        type: string
                        description: Alternative to _id
                      title:
                        type: string
                        minLength: 1
                        example: "Q1 Financial Report 2024"
            example:
              documents:
                - _id: "6645f2a3b1e2c3d4e5f60001"
                  title: "Q1 Financial Report 2024"
                - _id: "6645f2a3b1e2c3d4e5f60002"
                  title: "Chocolate Cake Recipe"
      responses:
        "200":
          description: Proposal generated
          content:
            application/json:
              example:
                success: true
                message: "AI successfully mapped documents to semantic folders."
                data:
                  updates:
                    - documentId: "6645f2a3b1e2c3d4e5f60001"
                      newPath: "Finance/Reports"
                    - documentId: "6645f2a3b1e2c3d4e5f60002"
                      newPath: "Personal/Recipes"
        "400":
          description: Validation error (empty documents array, missing title)
        "429":
          description: Token budget exceeded
          headers:
            Retry-After:
              schema: { type: integer }
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: string, format: date-time }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenBudget429"

  /api/ai/apply-folders:
    put:
      tags: [AI Core]
      summary: "Commit folder proposal to database (no AI call)"
      description: |
        Physically creates folder documents in MongoDB and updates each document's
        `folder`, `semanticPath`, and `isOrganized` fields.

        **No AI call is made. No tokens consumed.**
        This is a pure DB write — use after `POST /api/ai/organize-folder`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updates]
              properties:
                updates:
                  type: array
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/FolderUpdateItem"
            example:
              updates:
                - documentId: "6645f2a3b1e2c3d4e5f60001"
                  newPath: "Finance/Reports"
                - documentId: "6645f2a3b1e2c3d4e5f60002"
                  newPath: "Personal/Recipes"
      responses:
        "200":
          description: Applied successfully
          content:
            application/json:
              example:
                success: true
                message: "Physical folder structure generated and documents routed successfully!"
        "400":
          description: Validation error

  /api/ai/search:
    get:
      tags: [AI Core]
      summary: "⚡ Global semantic vector search"
      description: |
        Performs an Atlas VectorSearch across ALL of the user's embedded document chunks.
        Uses a `preFilter: { userId }` to guarantee strict cross-user isolation.
        Returns the top 5 matching chunks, hydrated with document metadata.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string (minimum 2 characters)
          schema:
            type: string
            minLength: 2
          example: "machine learning architectures"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              example:
                success: true
                count: 2
                data:
                  - text: "Neural networks are a subset of machine learning..."
                    confidenceScore: 94.72
                    documentId: "6645f2a3b1e2c3d4e5f60001"
                    documentTitle: "Intro to Deep Learning"
                    documentType: "PDF"
                    documentUrl: "https://res.cloudinary.com/..."
                    chunkIndex: 3
        "429":
          description: Token budget exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenBudget429"

  /api/ai/synthesize:
    post:
      tags: [AI Core]
      summary: "⚡ Synthesize multiple documents into one summary"
      description: |
        Combines the summaries and tags of multiple documents into a single
        coherent narrative using GPT-4o-mini. Useful for getting a bird's-eye
        view of a topic or folder.

        If only one documentId is provided, returns its existing summary directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentIds]
              properties:
                documentIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
            example:
              documentIds:
                - "6645f2a3b1e2c3d4e5f60001"
                - "6645f2a3b1e2c3d4e5f60002"
      responses:
        "200":
          description: Synthesis complete
          content:
            application/json:
              example:
                success: true
                data:
                  summary: "These documents collectively cover the fundamentals of neural network architectures and their financial applications in algorithmic trading..."
        "429":
          description: Token budget exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenBudget429"

  # ══════════════════════════════════════════════════════
  # DOCUMENT AI
  # ══════════════════════════════════════════════════════

  /api/documents/upload:
    post:
      tags: [Document AI]
      summary: "⚡ Upload files (triggers background AI pipeline)"
      description: |
        Uploads files to Cloudinary, creates Document records with `aiStatus: Pending`,
        then fires the full AI pipeline **asynchronously** (fire-and-forget):

        1. **OrchestratorService** — extracts title, summary, tags, contentType
        2. **CognitiveLoadService** — scores complexity (Light / Medium / Heavy)
        3. **EmbeddingService** — chunks and embeds text into Atlas Vector Search

        The HTTP response returns immediately (201) before processing completes.
        Token consumption is recorded after pipeline finishes.

        **Limits:** Max 5 files per upload, max 10MB per file.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "PDF, Word, or Image files (max 5, max 10MB each)"
                clientPaths:
                  type: array
                  items:
                    type: string
                  description: "Optional original paths to recreate folder structure (e.g. Research/AI/paper.pdf)"
      responses:
        "201":
          description: Files uploaded, AI processing queued
          content:
            application/json:
              example:
                success: true
                count: 2
                data:
                  - _id: "6645f2a3b1e2c3d4e5f60001"
                    title: "intro-to-ml.pdf"
                    fileType: "PDF"
                    aiStatus: "Pending"
                    cognitiveLoad: "Heavy"
                    folder: "6645f2a3b1e2c3d4e5f60099"
                    cloudinaryUrl: "https://res.cloudinary.com/..."
                    fileSize: 4194304
                skippedCount: 1
                skippedFiles: ["duplicate-file.pdf"]
        "409":
          description: All uploaded files were duplicates (SHA-256 check)
        "429":
          description: Token budget exceeded — upload blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenBudget429"

  /api/documents/{id}/chat:
    get:
      tags: [Document AI]
      summary: Get RAG chat history for a document
      description: |
        Returns full conversation history for a specific document, scoped strictly
        to the requesting user. Verifies document ownership before any DB access.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 24
            maxLength: 24
          example: "6645f2a3b1e2c3d4e5f60001"
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              example:
                success: true
                count: 4
                data:
                  - role: "user"
                    content: "What is the main thesis of this paper?"
                    createdAt: "2026-05-15T18:00:00.000Z"
                  - role: "assistant"
                    content: "The paper argues that transformer architectures significantly outperform..."
                    createdAt: "2026-05-15T18:00:02.000Z"
        "404":
          description: Document not found or unauthorized

    post:
      tags: [Document AI]
      summary: "⚡ Chat with a document (RAG)"
      description: |
        Retrieves the top 5 most relevant text chunks from the document's vector
        embeddings (preFiltered by both `documentId` AND `userId`), then generates
        a context-grounded answer using GPT-4o-mini.

        Both the user message and AI response are persisted to the chat history.
        The last 5 turns of history are included as context for follow-up questions.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 24
            maxLength: 24
          example: "6645f2a3b1e2c3d4e5f60001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  minLength: 1
                  example: "What are the key findings in chapter 3?"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              example:
                success: true
                data:
                  role: "ai"
                  content: "Chapter 3 presents three key findings: (1) the model achieves 94.2% accuracy..."
        "404":
          description: Document not found or unauthorized



  # ══════════════════════════════════════════════════════
  # FOLDER AI
  # ══════════════════════════════════════════════════════

  /api/folders/propose:
    post:
      tags: [Folder AI]
      summary: "⚡ Propose full-library semantic folder tree"
      description: |
        Auto-fetches ALL documents with `aiStatus: Analyzed` for the requesting user
        (max 100, newest first), then uses GPT-4o-mini with `withStructuredOutput()`
        to cluster them into a hierarchical `FolderTree`.

        **Differs from `/api/ai/organize-folder`:**
        | | `/api/ai/organize-folder` | `/api/folders/propose` |
        |---|---|---|
        | Input | Caller selects specific docs | Auto-fetches ALL analyzed docs |
        | Output | Flat `[{ documentId, newPath }]` | Hierarchical `FolderTree[]` with reasons |
        | Purpose | "Move these specific docs" | "How should my whole library look?" |

        **Read-only — no DB writes.** No request body required.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Proposed tree (or empty if fewer than 2 analyzed documents)
          content:
            application/json:
              examples:
                withTree:
                  summary: Full proposal
                  value:
                    success: true
                    message: "Proposed 4 top-level folders for 12 documents."
                    data:
                      tree:
                        - name: "Finance & Reporting"
                          reason: "All invoices, tax documents, and quarterly reports share a financial administrative context."
                          documentIds: ["6645f2a3b1e2c3d4e5f60001"]
                          subfolders:
                            - name: "Q1 Reports"
                              reason: "January-March financial summaries."
                              documentIds: ["6645f2a3b1e2c3d4e5f60002"]
                        - name: "AI & Machine Learning"
                          reason: "Research papers and lecture notes on deep learning and NLP."
                          documentIds: ["6645f2a3b1e2c3d4e5f60003"]
                          subfolders: []
                      documentCount: 12
                      wasCapped: false
                notEnough:
                  summary: Not enough documents
                  value:
                    success: true
                    message: "Not enough analyzed documents. Upload and analyze at least 2 documents first."
                    data:
                      tree: []
                      documentCount: 1
                capped:
                  summary: Library capped at 100
                  value:
                    success: true
                    message: "Proposed 8 top-level folders for 100 documents."
                    data:
                      tree: []
                      documentCount: 100
                      wasCapped: true
                      capWarning: "Only the 100 most recently analyzed documents were included in this proposal."
        "429":
          description: Token budget exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenBudget429"

  # ══════════════════════════════════════════════════════
  # COMPARISON
  # ══════════════════════════════════════════════════════

  /api/comparison/compare:
    post:
      tags: [Comparison]
      summary: "⚡ Deep compare two documents (DeepThinkerService)"
      description: |
        Runs a semantic comparison between two documents using **Llama 3.3 70B** via Groq.
        Falls back to **Llama 3.1 8B** automatically on timeout or rate limit.

        Both documents must belong to the requesting user — verified atomically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentIds]
              properties:
                documentIds:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    type: string
                    minLength: 24
                    maxLength: 24
            example:
              documentIds:
                - "6645f2a3b1e2c3d4e5f60001"
                - "6645f2a3b1e2c3d4e5f60002"
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              example:
                success: true
                data:
                  similarities:
                    - "Both focus on supervised learning"
                  differences:
                    - "Doc A covers regression, Doc B covers classification"
                  uniqueToA:
                    - "Linear regression derivation"
                  uniqueToB:
                    - "Decision tree pruning"
        "400":
          description: Must provide exactly 2 document IDs
        "404":
          description: One or both documents not found or unauthorized
